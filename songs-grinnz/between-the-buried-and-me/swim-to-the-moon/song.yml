metadata:
  title: Swim to the Moon
  file-include: "../../../albums/the-great-misdirect.yml"
  track-number: 6
  author: Grinnz, GHX
audio:
  album-desert:
    md5: 9d91553c5ba8560e0a82cded6db8a0b2
    frames: 14704704
  album-swim:
    md5: a90107f8ec26e03c52daef773fca0a46
    frames: 47345172
  no-guitars:
    # from Sheet Happens
    file-path: "06 Swim To The Moon Jam Track - No Guitars.mp3"
  stems-no-guitars:
    file-path: audio-stems-no-guitars.wav
    commands:
    - ../../../scripts/stems AUDIO(no-guitars) audio-stems-no-guitars.wav
    channels: 8
plans:
  album:
    song:
      &song
      concatenate:
      - fade:
        - start
        - 2.091
        - take: [end, 2.091, album-desert]
      - album-swim
  dev:
    song: *song
    parts:
      no-guitars:
        pad: [2.521, no-guitars]
      stem-bass:
        pad: [2.521, channels: [[0, 1], stems-no-guitars]]
      stem-drums:
        pad: [2.521, channels: [[2, 3], stems-no-guitars]]
      stem-vocal:
        pad: [2.521, channels: [[4, 5], stems-no-guitars]]
      stem-keys:
        pad: [2.521, channels: [[6, 7], stems-no-guitars]]
parts:
  drums: # Grinnz
    drums:
      kicks: 2
  guitar: # GHX
    # TODO: quantize, move keys parts to keys, any other edits
    grybo: {}
  bass:
    pro-guitar:
      tuning:
        base: bass-5
        global: -3 # G# C# F# B E
      tones:
        file-tone-base: ../../../tones/SatchBoogie_bass.tone2014.xml
  keys:
    pro-keys: {}
targets:
  rb3:
    game: rb3
    plan: album
  rb3-2x:
    game: rb3
    2x-bass-pedal: true
    plan: album
  ps:
    game: ps
    plan: album
